    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        // Sofort registrieren (nicht auf 'load' warten) damit SW schneller aktiv wird
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then(function(reg) {
            reg.update();
            // Nach Aktivierung: geladene Assets an SW zum Cachen senden
            function cacheCurrentAssets(worker) {
              if (!worker) return;
              var assets = [];
              document.querySelectorAll('script[src]').forEach(function(el) {
                if (el.src && el.src.startsWith(window.location.origin)) assets.push(el.src);
              });
              document.querySelectorAll('link[rel=stylesheet]').forEach(function(el) {
                if (el.href && el.href.startsWith(window.location.origin)) assets.push(el.href);
              });
              if (assets.length > 0) {
                worker.postMessage({ type: 'CACHE_URLS', urls: assets });
              }
            }
            // Wenn SW bereits aktiv: sofort cachen
            if (reg.active) cacheCurrentAssets(reg.active);
            // Wenn neuer SW installiert wird: nach Aktivierung cachen
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'activated') cacheCurrentAssets(newWorker);
                });
              }
            });
          })
          .catch(function() {});
      }
    </script>
